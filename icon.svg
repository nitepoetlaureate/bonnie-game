  <line x1="28" y1="76" x2="48" y2="76" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="80" y1="72" x2="100" y2="70" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="80" y1="76" x2="100" y2="76" stroke="#1a1a2e" stroke-width="1"/>
